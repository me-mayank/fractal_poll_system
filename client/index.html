<!doctype html>
<html>
  <head>
    <title>Live Poll</title>
    <style>
      body {
        font-family: Arial;
        text-align: center;
      }

      .option {
        width: 300px;
        margin: 10px auto;
        padding: 12px;
        border: 2px solid #ccc;
        cursor: pointer;
        position: relative;
        overflow: hidden;
      }

      .bar {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 0%;
        background-color: lightgreen;
        transition: 0.5s;
        z-index: 0;
      }

      .text {
        position: relative;
        z-index: 1;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <h2>Vote</h2>

    <div class="option" onclick="vote('A')">
      <div class="bar" id="bar-A"></div>
      <div class="text" id="text-A">A</div>
    </div>

    <div class="option" onclick="vote('B')">
      <div class="bar" id="bar-B"></div>
      <div class="text" id="text-B">B</div>
    </div>

    <div class="option" onclick="vote('C')">
      <div class="bar" id="bar-C"></div>
      <div class="text" id="text-C">C</div>
    </div>

    <div class="option" onclick="vote('D')">
      <div class="bar" id="bar-D"></div>
      <div class="text" id="text-D">D</div>
    </div>

    <h3 id="status"></h3>

    <script src="script.js"></script>
  </body>
</html>
